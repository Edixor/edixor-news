name: Update News Index

on:
  push:
    paths:
      - 'News/**'
      - '.github/workflows/update-news.yml'

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Run Python generator
        run: python .github/scripts/generate_index.py


      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add News/index.json
          git commit -m "chore: update news index" || echo "No changes"
          git push

      - name: Commit and push changes (if any)
        env:
            GH_PAT: ${{ secrets.PAT }}
        run: |
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git remote set-url origin https://x-access-token:${GH_PAT}@github.com/Terafy/edixor-news.git
            git add News/index.json
            git diff --cached --quiet || git commit -m "chore: update index.json"
            git push origin main

