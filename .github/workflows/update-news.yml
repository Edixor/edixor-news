name: Update News Index

on:
  push:
    paths:
      - 'News/**'
      - '.github/workflows/update-news.yml'

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2  # или @v3 — обе версии подходят

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Run Python generator
        run: python .github/scripts/generate_index.py

      - name: Commit and push changes (if any)
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add News/index.json
          git diff --cached --quiet || git commit -m "chore: update news index"
          git push origin main
